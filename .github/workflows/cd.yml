name: CD

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Run build script
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.SIGNER_SECRET_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.SIGNER_PASSWORD }}
          PANDORA_UPDATE_PUBKEY: ${{ secrets.SIGNER_PUBLIC_KEY }}
          GITHUB_REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          PANDORA_DISTRIBUTION: official
        run: bash ./scripts/build_windows.sh ${{ github.ref_name }}
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-Windows-x86_64
          path: dist/*

      - name: Push README build info to main
        continue-on-error: true
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          cp README.md /tmp/README.md.build
          git stash push -- README.md
          git fetch origin main
          git checkout main
          git pull --rebase origin main
          cp /tmp/README.md.build README.md
          git add README.md
          git diff --staged --quiet || git commit -m "docs: update README build info for ${{ github.ref_name }}"
          git push origin main

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          {
            awk "/^## \\[${VERSION}\\]/{flag=1; next} /^## \\[/{if(flag) exit} flag" CHANGELOG.md
            echo ""
            echo "## Downloads"
            echo ""
            echo "- **Installer:** \`QuartzLauncher-Windows-x86_64-Setup.exe\`"
            echo "- **Portable:** \`QuartzLauncher-Windows-x86_64-Portable.exe\`"
          } > release_body.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          body_path: release_body.md
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
