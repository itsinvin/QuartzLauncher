name: Check

on:
  push:
    branches: [main]
    tags-ignore: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --release -p quartz_launcher

      - name: Update README build info
        shell: bash
        run: python scripts/update_readme.py

      - name: Commit README on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        run: bash ./scripts/commit_readme_if_changed.sh
